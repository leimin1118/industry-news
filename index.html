<!DOCTYPE html>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #0f1923;
            color: #e0e0e0;
            overflow-x: hidden;
        }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }

        /* 头部 */
        header {
            background: rgba(15,25,35,0.95);
            backdrop-filter: blur(10px);
            padding: 18px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo h1 {
            font-size: 1.3rem;
            color: #fff;
            font-weight: 700;
        }
        .logo h1 span { color: #4fc3f7; }
        .logo .tagline { font-size: 0.75rem; color: #7f8c8d; margin-top: 2px; }

        .hero {
            text-align: center;
            padding: 40px 0 20px;
        }
        .hero h1 { font-size: 2.2rem; color: #fff; margin-bottom: 8px; }
        .hero h1 span { color: #4fc3f7; }
        .hero p { color: #95a5a6; font-size: 1rem; }

        .search-bar {
            max-width: 500px;
            margin: 18px auto 0;
            display: flex;
            gap: 8px;
        }
        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.3s;
        }
        .search-bar input:focus { border-color: #4fc3f7; }
        .search-bar input::placeholder { color: #555; }
        .search-bar button {
            padding: 10px 20px;
            background: #4fc3f7;
            color: #0f1923;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .search-bar button:hover { background: #29b6f6; }

        /* 地图容器 */
        .map-wrap {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0 30px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        #worldmap { width: 100%; height: auto; display: block; cursor: pointer; }
        #worldmap path {
            stroke: #1a2a3a;
            stroke-width: 0.6;
            transition: fill 0.2s ease, stroke 0.2s;
        }
        #worldmap path:hover { opacity: 0.8; stroke: #4fc3f7; stroke-width: 1.2; }

        .top10-btn {

            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: #ccc; font-size: 0.85rem;
            cursor: pointer; transition: all 0.2s;
        }
        .top10-btn:hover {
            background: rgba(79,195,247,0.15);
            border-color: #4fc3f7; color: #fff;
            transform: translateY(-1px);
        }

        .modal-overlay {
            display: none;

            background: rgba(0,0,0,0.65);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.active { display: flex; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

        .modal-box {
            background: #1a2a3a;
            border-radius: 16px;
            width: 95%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease;
        }

            from { transform: translateY(50px); opacity:0; }

            .info-bar { gap: 4px 12px; }
            .hero h1 { font-size: 1.5rem; }

function getNewsForCountry(countryName) {
    // 尝试映射英文名到中文
    const nameMap = {
        'china': '中国', 'united states': '美国', 'usa': '美国',
        'canada': '加拿大', 'japan': '日本', 'south korea': '韩国', 'korea': '韩国',

        'brazil': '巴西', 'italy': '意大利', 'spain': '西班牙',
        'netherlands': '荷兰', 'sweden': '瑞典', 'switzerland': '瑞士',
        'uae': '阿联酋', 'saudi arabia': '沙特阿拉伯',
    };
    const key = (nameMap[countryName.toLowerCase()] || countryName);
    const news = countryNews[key];
    if (news) return news;
    // 模糊匹配
    for (const [cn, items] of Object.entries(countryNews)) {
        if (countryName.includes(cn) || cn.includes(countryName)) return items;
    }
    return defaultNews;
}

}
function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    document.body.style.overflow = '';

function formatNumber(num) {
    if (num >= 1000000000) return (num/1000000000).toFixed(2) + ' 亿';
    if (num >= 1000000) return (num/1000000).toFixed(2) + ' 百万';
    if (num >= 10000) return (num/10000).toFixed(1) + ' 万';
    return num.toLocaleString();
}

        let tabsHtml = '<div class="industry-tabs">';

        industryTabs.forEach((tabId, idx) => {

// ============================
// 6.5 切换行业分类选项卡
function toggleNewsDetail(e, id) {
    e.preventDefault();
    const detail = document.getElementById('detail-' + id);
    if (!detail) return;
    const isOpen = detail.classList.contains('open');
    // 关闭同一分类下其他展开项
    const parent = detail.closest('.news-section');
    if (parent) {
        parent.querySelectorAll('.news-detail.open').forEach(d => {
            if (d.id !== 'detail-' + id) {
                d.classList.remove('open');
                const icon = d.closest('.industry-news-item')?.querySelector('.toggle-icon i');
                if (icon) icon.className = 'fas fa-chevron-down';
            }
        });
    }
    if (isOpen) {
        detail.classList.remove('open');
        e.currentTarget.querySelector('.toggle-icon i').className = 'fas fa-chevron-down';
    } else {
        detail.classList.add('open');
        e.currentTarget.querySelector('.toggle-icon i').className = 'fas fa-chevron-up';
    }
}
// ============================
function switchIndustryTab(tabId) {
    document.querySelectorAll('.industry-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.news-section').forEach(s => s.classList.remove('active'));
    document.querySelector(`.industry-tab-${tabId}`).classList.add('active');
    document.getElementById(`section-${tabId}`).classList.add('active');
}

// ============================
// 6. 搜索
// ============================
function searchCountry() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!q) return;
    let code=null, name=null;
    for (const [n,c] of Object.entries(countryMap)) {
        if (n.toLowerCase()===q || n.toLowerCase().includes(q)) { code=c; name=n; break; }
    }
    if (code) {
        showCountryInfo(name, code);
        g.selectAll('path').attr('opacity', 0.7);
        g.selectAll('path').filter(d => d.id===code).attr('opacity',1).attr('stroke','#4fc3f7').attr('stroke-width',2);
    } else {
        openModal();
        document.getElementById('modalTitle').innerHTML = `<span>🔍 未找到</span>`;
        document.getElementById('modalSub').textContent = '';
        document.getElementById('modalBody').innerHTML = `<div style="text-align:center;padding:30px;color:#e67e22;"><p>未找到 "${document.getElementById('searchInput').value.trim()}"</p></div>`;
    }
}

// ============================
// 7. 初始化地图
// ============================
async function initMap() {
    try {
        const world = worldAtlasData;
        world.objects.countries.geometries.forEach(c => {
            if (c.properties?.name) countryMap[c.properties.name] = c.id;
        });

        svg = d3.select('#worldmap');
        g = svg.append('g');
        const projection = d3.geoMercator().fitSize([1000,600], {type:'Sphere'});
        path = d3.geoPath().projection(projection);

        g.selectAll('path')
            .data(topojson.feature(world, world.objects.countries).features)
            .join('path')
            .attr('d', path)
            .attr('fill', d => continentColors[d.properties.continent] || '#2c3e50')
            .attr('stroke', '#1a2a3a').attr('stroke-width', 0.6)
            .on('click', function(ev, d) {
                showCountryInfo(d.properties.name, d.id);
                g.selectAll('path').attr('opacity', 0.7);
                d3.select(this).attr('opacity',1).attr('stroke','#4fc3f7').attr('stroke-width',2);
            })
            .on('mouseover', function() { d3.select(this).attr('opacity',0.85); })
            .on('mouseout', function() { d3.select(this).attr('opacity',null); });

        g.selectAll('text')
            .data(topojson.feature(world, world.objects.countries).features.filter(d=>labelCountries[d.properties.name]))
            .join('text')
            .attr('transform', d => `translate(${path.centroid(d)[0]},${path.centroid(d)[1]})`)
            .attr('text-anchor','middle').attr('font-size','11px').attr('font-weight','600')
            .attr('fill','#fff').attr('stroke','#0f1923').attr('stroke-width',0.4).attr('paint-order','stroke')
            .text(d => labelCountries[d.properties.name]);

        document.getElementById('loading').style.display = 'none';
        svg.style('display', 'block');
    } catch(e) {
        document.getElementById('loading').innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#e74c3c;"></i><p style="color:#e74c3c;">地图加载失败</p>`;
    }
}
